<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>The Answering Machine (TAM)</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f8ff;
      text-align: center;
      padding: 50px;
    }

    h1 {
      color: #333;
    }

    #message {
      margin: 30px auto;
      padding: 20px;
      max-width: 600px;
      font-size: 1.25rem;
      background-color: #ffffff;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    button {
      padding: 12px 24px;
      font-size: 1rem;
      background-color: #28a745;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: #218838;
    }
  </style>
</head>
<body>

  <h1>The Answering Machine (TAM)</h1>
  <button onclick="generateMessage()">Generate Message</button>
  <div id="message">Click the button to receive your motivational message.</div>

  <script src="script.js"></script>
</body>
</html>
